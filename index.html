function load(k,d){try{const s=localStorage.getItem('cc2_'+k);return s?JSON.parse(s):d;}catch(e){return d;}}
function save(k,v){try{localStorage.setItem('cc2_'+k,JSON.stringify(v));}catch(e){}}
const S={
  panel:'accounts',dark:load('dark',false),search:'',
  accounts:load('accounts',DEF.accounts),
  durations:load('durations',DEF.durations),
  dispositions:load('dispositions',DEF.dispositions),
  aer:load('aer',DEF.aer),
  acronyms:load('acronyms',DEF.acronyms),
  reminders:load('reminders',DEF.reminders),
  qa:load('qa',DEF.qa),
  users:load('users',DEF.users),
  revisions:load('revisions',[]),
  selAcc:null,activeTab:'opening',accFilt:'All',
  aerSel:null,qaChk:{},
  auth:false,adminPanel:'dashboard',editId:null,
  gSearchQ:'',gSearchRes:[]
};
function initQA(){const r={};S.qa.forEach(s=>s.items.forEach(i=>r[i.id]=true));S.qaChk=r;}
initQA();
function persist(k){save(k,S[k]);}
function addRev(section,desc){
  S.revisions=[{id:Date.now(),ts:new Date().toLocaleString(),section,desc},...S.revisions.slice(0,99)];
  persist('revisions');
}
function notify(msg){
  const n=document.createElement('div');n.className='ntf';n.textContent=msg;
  document.body.appendChild(n);setTimeout(()=>n.remove(),2500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gv(id){const e=document.getElementById(id);return e?e.value:'';}

// ── RENDER ──────────────────────────────────────────────────────────
function render(){
  if(S.dark)document.body.setAttribute('data-dark','1');
  else document.body.removeAttribute('data-dark');
  document.getElementById('root').innerHTML=S.panel==='admin'&&!S.auth?loginHTML():appHTML();
  bind();
}
function ri(){const c=document.getElementById('content');if(c){c.innerHTML=panelHTML();bind();}}
function ra(){const c=document.querySelector('.ac2');if(c){c.innerHTML=admSec();bind();}}

// ── PANELS ───────────────────────────────────────────────────────────
const TC={inhome:{bg:'rgba(16,185,129,0.1)',cl:'#10b981'},telemed:{bg:'rgba(59,130,246,0.1)',cl:'#3b82f6'},clinic:{bg:'rgba(34,197,94,0.1)',cl:'#16a34a'},mu:{bg:'rgba(245,158,11,0.1)',cl:'#d97706'}};
const SL={opening:'Opening',pitch:'Pitch',verification:'Verification',required:'Required Info',closing:'Closing'};

function panelHTML(){
  switch(S.panel){
    case 'accounts':return accPanel();
    case 'admin':return admPanel();
    default:return '';
  }

function accPanel(){
  const q=S.search.toLowerCase();
  const vis=S.accounts.filter(a=>{
    if(a.visible===false)return false;
    const ms=!q||a.name.toLowerCase().includes(q)||a.tag.toLowerCase().includes(q);
    const mf=S.accFilt==='All'||a.types.some(t=>t.toLowerCase()===S.accFilt.toLowerCase());
    return ms&&mf;
  });
  const sel=S.accounts.find(a=>a.id===S.selAcc);
  return `<div class="pills">
    ${['All','In-Home','Telemedicine','Clinic','Mobile Unit'].map(f=>`<button class="pill${S.accFilt===f?' on':''}" data-f="${f}">${f}</button>`).join('')}

        ${a.gc?'<span class="gc-ic">🎁</span>':''}

}

    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">

// ── RICH TEXT EDITOR ─────────────────────────────────────────────────
function rteHTML(bodyId,content){
  const tools=[
    {cmd:'bold',lb:'<b>B</b>'},{cmd:'italic',lb:'<i>I</i>'},{cmd:'underline',lb:'<u>U</u>'},
    {cmd:'strikeThrough',lb:'<s>S</s>'},'|',
    {cmd:'formatBlock',val:'h1',lb:'H1'},{cmd:'formatBlock',val:'h2',lb:'H2'},
    {cmd:'formatBlock',val:'p',lb:'P'},'|',
    {cmd:'insertUnorderedList',lb:'•—'},{cmd:'insertOrderedList',lb:'1.'},'|',
    {cmd:'createLink',lb:'🔗'},{cmd:'removeFormat',lb:'✕'},'|',
    {cmd:'undo',lb:'↩'},{cmd:'redo',lb:'↪'}
  ];
  return `<div class="rte-wrap">
    <div class="rte-tb">
      <select class="rsel" data-rte="${bodyId}" data-cmd="fontSize">
        ${[1,2,3,4,5].map((s,i)=>`<option value="${s}" ${s===3?'selected':''}>${[10,12,14,16,18][i]}px</option>`).join('')}
      </select>
      <select class="rsel" data-rte="${bodyId}" data-cmd="foreColor" style="width:76px">
        <option value="">Color</option>
        <option value="#000000">Black</option><option value="#ef4444">Red</option>
        <option value="#f59e0b">Orange</option><option value="#10b981">Green</option>
        <option value="#3b82f6">Blue</option><option value="#7c3aed">Purple</option>
      </select>
      <select class="rsel" data-rte="${bodyId}" data-cmd="hiliteColor" style="width:82px">
        <option value="transparent">Highlight</option>
        <option value="#fef08a">Yellow</option><option value="#bbf7d0">Green</option>
        <option value="#bfdbfe">Blue</option><option value="#fecaca">Red</option>
      </select>
      <div class="rsep"></div>
      ${tools.map(t=>t==='|'?'<div class="rsep"></div>':
        `<button class="rte-t" data-rte="${bodyId}" data-cmd="${t.cmd}" ${t.val?`data-val="${t.val}"`:''}>${t.lb}</button>`
      ).join('')}
    </div>
    <div class="rbody" id="${bodyId}" contenteditable="true">${content}</div>
  </div>`;
}

// ── ACCOUNTS MANAGER ─────────────────────────────────────────────────
function admAccs(){
  return `<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div><div class="st">Manage Accounts</div><div class="ss">Create, edit, delete, and toggle visibility</div></div>
      <button class="btn bp" id="add-acc">+ New Account</button>
    </div>
    ${S.editId==='new-acc'?accForm(null):''}
    ${S.accounts.map(a=>S.editId===a.id?accForm(a):accRow(a)).join('')}
  </div>`;
}

function accRow(a){
  const tc=TC[a.tag]||TC.inhome;
  return `<div class="rw">
    <span class="dh">⠿</span>
    <label class="tog"><input type="checkbox" ${a.visible!==false?'checked':''} data-tog-acc="${a.id}"/><div class="ttrack"></div></label>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        <span style="font-size:13px;font-weight:600;color:var(--text)">${esc(a.name)}</span>
        <span style="display:inline-block;padding:1px 7px;border-radius:999px;font-size:9px;font-weight:800;text-transform:uppercase;background:${tc.bg};color:${tc.cl}">${a.types[0]}</span>
        ${a.gc?'<span>🎁</span>':''}
        <span class="bdg ${a.visible===false?'bg-y':'bg-g'}">${a.visible===false?'Hidden':'Published'}</span>
      </div>
      <div style="font-size:10.5px;color:var(--text3);font-family:monospace">${esc(a.dur)} · ${esc(a.win)}</div>

    <button class="btn bd bsm" data-del-acc="${a.id}">🗑</button>

}

function accForm(a){
  const isNew=!a;
  const v=a||{id:Date.now(),name:'',tag:'inhome',types:['In-Home'],dur:'45 min',win:'3 hrs',gc:false,gcAmt:'',gcType:'',gcTime:'',gcContact:'',gcNote:'',visible:true,seo:{title:'',desc:''},scripts:{opening:'',pitch:'',verification:'',required:'',closing:''}};
  return `<div style="background:var(--bg2);border:2px solid var(--accent);border-radius:10px;padding:16px;margin-bottom:10px">
    <div style="font-size:11px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:12px">${isNew?'➕ New Account':'✏️ Edit: '+esc(v.name)}</div>
    <div class="fg">
      <div><label class="albl">Account Name</label><input class="ainp" id="af-name" value="${esc(v.name)}" placeholder="e.g. Regal (English)"/></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div><label class="albl">Type Tag</label><select class="ainp" id="af-tag">${['inhome','telemed','clinic','mu'].map(t=>`<option value="${t}" ${v.tag===t?'selected':''}>${t}</option>`).join('')}</select></div>
        <div><label class="albl">Duration</label><input class="ainp" id="af-dur" value="${esc(v.dur)}"/></div>
        <div><label class="albl">Window</label><input class="ainp" id="af-win" value="${esc(v.win)}"/></div>
      </div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:8px">
        <div><label class="albl">Display Types (comma-separated)</label><input class="ainp" id="af-types" value="${esc((v.types||[]).join(', '))}"/></div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:20px">
          <label class="tog"><input type="checkbox" id="af-gc" ${v.gc?'checked':''}/><div class="ttrack"></div></label>
          <span style="font-size:13px;color:var(--text2)">Has Gift Card</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        <div><label class="albl">GC Amount</label><input class="ainp" id="af-gcAmt" value="${esc(v.gcAmt)}"/></div>
        <div><label class="albl">GC Type</label><input class="ainp" id="af-gcType" value="${esc(v.gcType)}"/></div>
        <div><label class="albl">GC Timeframe</label><input class="ainp" id="af-gcTime" value="${esc(v.gcTime)}"/></div>
        <div><label class="albl">GC Contact</label><input class="ainp" id="af-gcContact" value="${esc(v.gcContact)}"/></div>
      </div>
      <div><label class="albl">GC Notes</label><input class="ainp" id="af-gcNote" value="${esc(v.gcNote)}"/></div>
      ${['opening','pitch','verification','required','closing'].map(k=>`
        <div><label class="albl">${SL[k]||k} Script</label>
          ${rteHTML('rte-'+k,v.scripts&&v.scripts[k]||'')}
        </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn bp" data-save-acc="${v.id}" data-new="${isNew?1:0}">💾 Save Account</button>
        <button class="btn bg" id="af-cancel">Cancel</button>
      </div>
    </div>
  </div>`;
}

// ── EVENT BINDING ────────────────────────────────────────────────────
function bind(){
  // Navigation
  document.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>{S.panel=b.dataset.p;ri()});
  document.querySelectorAll('[data-an]').forEach(b=>b.onclick=()=>{S.adminPanel=b.dataset.an;ra()});
  
  // Dark mode
  const dtog=document.getElementById('dark-tog');
  if(dtog)dtog.onclick=()=>{S.dark=!S.dark;persist('dark');render()};
  
  // Accounts grid
  document.querySelectorAll('[data-aid]').forEach(e=>e.onclick=()=>{S.selAcc=parseInt(e.dataset.aid);ri()});
  
  // Script tabs
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{S.activeTab=b.dataset.tab;ri()});
  
  // RTE Toolbar
  document.querySelectorAll('[data-cmd]').forEach(btn=>{
    const cmd=btn.dataset.cmd;
    const val=btn.dataset.val;
    const rteId=btn.dataset.rte;
    btn.onclick=()=>{
      const bodyEl=document.getElementById(rteId);
      if(bodyEl){
        if(cmd==='fontSize' || cmd==='foreColor' || cmd==='hiliteColor'){
          document.execCommand(cmd,false,btn.value);
        }else if(cmd==='formatBlock'){
          document.execCommand(cmd,false,val);
        }else{
          document.execCommand(cmd,false,null);
        }
        bodyEl.focus();
      }
    };
  });

  // Font size select
  document.querySelectorAll('select[data-cmd="fontSize"]').forEach(sel=>{
    sel.onchange=()=>{
      const rteId=sel.dataset.rte;
      const bodyEl=document.getElementById(rteId);
      if(bodyEl){
        document.execCommand('fontSize',false,sel.value);
        bodyEl.focus();
      }
    };
  });

  // Color selects
  document.querySelectorAll('select[data-cmd="foreColor"]').forEach(sel=>{
    sel.onchange=()=>{
      if(sel.value){
        const rteId=sel.dataset.rte;
        const bodyEl=document.getElementById(rteId);
        if(bodyEl){
          document.execCommand('foreColor',false,sel.value);
          bodyEl.focus();
        }
      }
    };
  });

  document.querySelectorAll('select[data-cmd="hiliteColor"]').forEach(sel=>{
    sel.onchange=()=>{
      const rteId=sel.dataset.rte;
      const bodyEl=document.getElementById(rteId);
      if(bodyEl){
        document.execCommand('hiliteColor',false,sel.value||'transparent');
        bodyEl.focus();
      }
    };
  });

  // Admin
  const addAcc=document.getElementById('add-acc');
  if(addAcc)addAcc.onclick=()=>{S.editId='new-acc';ra()};
  
  const saveBtn=document.querySelector('[data-save-acc]');
  if(saveBtn)saveBtn.onclick=()=>saveAccount();
  
  const cancelBtn=document.getElementById('af-cancel');
  if(cancelBtn)cancelBtn.onclick=()=>{S.editId=null;ra()};

  const delBtn=document.querySelector('[data-del-acc]');
  if(delBtn)delBtn.onclick=()=>{
    const id=parseInt(delBtn.dataset.delAcc);
    S.accounts=S.accounts.filter(a=>a.id!==id);
    persist('accounts');
    ra();
  };
}

function saveAccount(){
  const saveBtn=document.querySelector('[data-save-acc]');
  if(!saveBtn)return;
  
  const id=parseInt(saveBtn.dataset.saveAcc);
  const isNew=parseInt(saveBtn.dataset.new);
  
  const name=document.getElementById('af-name').value;
  const tag=document.getElementById('af-tag').value;
  const dur=document.getElementById('af-dur').value;
  const win=document.getElementById('af-win').value;
  const types=(document.getElementById('af-types').value||'').split(',').map(t=>t.trim()).filter(t=>t);
  const gc=document.getElementById('af-gc').checked;
  const gcAmt=document.getElementById('af-gcAmt').value;
  const gcType=document.getElementById('af-gcType').value;
  const gcTime=document.getElementById('af-gcTime').value;
  const gcContact=document.getElementById('af-gcContact').value;
  const gcNote=document.getElementById('af-gcNote').value;
  
  // Get formatted content from RTE (this preserves HTML formatting)
  const scripts={
    opening:document.getElementById('rte-opening')?.innerHTML||'',
    pitch:document.getElementById('rte-pitch')?.innerHTML||'',
    verification:document.getElementById('rte-verification')?.innerHTML||'',
    required:document.getElementById('rte-required')?.innerHTML||'',
    closing:document.getElementById('rte-closing')?.innerHTML||''
  };
  
  if(isNew){
    S.accounts.push({id,name,tag,dur,win,types,gc,gcAmt,gcType,gcTime,gcContact,gcNote,visible:true,seo:{title:'',desc:''},scripts});
  }else{
    const acc=S.accounts.find(a=>a.id===id);
    if(acc){
      acc.name=name;
      acc.tag=tag;
      acc.dur=dur;
      acc.win=win;
      acc.types=types;
      acc.gc=gc;
      acc.gcAmt=gcAmt;
      acc.gcType=gcType;
      acc.gcTime=gcTime;
      acc.gcContact=gcContact;
      acc.gcNote=gcNote;
      acc.scripts=scripts;
    }
  }
  
  persist('accounts');
  addRev('Accounts',isNew?'Account created':'Account updated');
  S.editId=null;
  notify('Account saved!');
  ra();
}

render();
</script>
