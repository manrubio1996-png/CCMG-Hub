<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Care Connectors Hub v2.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--bg2:#fff;--bg3:#f1f5f9;--bg4:#e8edf3;
  --border:#dde3ec;--border2:#c8d0db;
  --text:#0d1b2a;--text2:#3d5166;--text3:#8898aa;
  --accent:#00c9a7;--accent2:#009e84;--accentB:#3b82f6;
  --green:#10b981;--gbg:rgba(16,185,129,0.1);
  --yellow:#f59e0b;--ybg:rgba(245,158,11,0.1);
  --red:#ef4444;--rbg:rgba(239,68,68,0.1);
  --admin:#7c3aed;--abg:rgba(124,58,237,0.08);
  --sh:0 2px 8px rgba(0,0,0,0.07);--sh2:0 8px 30px rgba(0,0,0,0.12);
  --r:10px;
}
[data-dark]{
  --bg:#0b1220;--bg2:#141e2e;--bg3:#1a2840;--bg4:#1f3050;
  --border:#1e3050;--border2:#2a4060;
  --text:#e8f0fe;--text2:#8ba4c0;--text3:#4a6280;
}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
button{cursor:pointer;font-family:inherit;font-size:13px;transition:all 0.15s}
input,textarea,select{font-family:inherit;font-size:13px;color:var(--text);background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#header{height:60px;background:linear-gradient(120deg,var(--accent),var(--accentB));display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
#content{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
.sb-logo{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-ic{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accentB));display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;flex-shrink:0}
.sb-brand{font-size:12px;font-weight:800;color:var(--text);line-height:1.2}
.sb-ver{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.18em;font-family:monospace}
.nav-grp{padding:10px 8px 4px}
.nav-grp-hdr{display:flex;align-items:center;justify-content:space-between;gap:4px}
.nav-lbl{font-size:9px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:0.22em;padding:0 8px;margin-bottom:3px;font-family:monospace;flex:1}
.nav-grp-btn{width:20px;height:20px;padding:0;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.nav-grp-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn{width:100%;display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--text2);font-weight:500;font-size:12px;margin-bottom:2px;justify-content:space-between}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:rgba(0,201,167,0.12);border-color:rgba(0,201,167,0.3);color:var(--accent2);font-weight:600}
.nav-btn.adm.active{background:var(--abg);border-color:rgba(124,58,237,0.25);color:var(--admin)}
.nav-ic{font-size:15px;flex-shrink:0;width:18px;text-align:center}
.nav-btn-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.nav-btn-right{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity 0.2s}
.nav-btn:hover .nav-btn-right{opacity:1}
.nav-btn-icon{width:18px;height:18px;padding:0;border:none;background:transparent;color:var(--text3);font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.nav-btn-icon:hover{color:var(--text)}
.sb-foot{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.h-title{font-size:15px;font-weight:700;color:#fff}
.h-sub{font-size:10px;color:rgba(255,255,255,0.72);text-transform:uppercase;letter-spacing:0.1em;font-family:monospace}
.h-wrap{position:relative}
.h-act{display:flex;align-items:center;gap:8px}
.hbtn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.22);color:#fff;border-radius:7px;padding:5px 11px;font-size:12px;cursor:pointer}
.hbtn:hover{background:rgba(255,255,255,0.25)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
.chdr{font-size:9.5px;font-weight:900;text-transform:uppercase;letter-spacing:0.22em;color:var(--text3);font-family:monospace;margin-bottom:12px}
.btn{padding:7px 14px;border-radius:7px;border:none;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;cursor:pointer}
.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--accent2)}
.bd{background:var(--rbg);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.bg{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}.bg:hover{border-color:var(--border2);color:var(--text)}
.bpu{background:var(--abg);color:var(--admin);border:1px solid rgba(124,58,237,0.2)}
.bsm{padding:4px 9px;font-size:11px}
.fg{display:flex;flex-direction:column;gap:10px}
.albl{font-size:10.5px;font-weight:700;color:var(--text2);margin-bottom:3px;display:block}
.ainp{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text)}
.st{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px}
.ss{font-size:12px;color:var(--text3);margin-bottom:14px}
.nav-ed{background:var(--bg2);border:2px solid var(--accent);border-radius:8px;padding:12px;margin-bottom:10px}
.rw{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);margin-bottom:5px;justify-content:space-between}
.rw:hover{border-color:var(--border2);background:var(--bg3)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── DATA ────────────────────────────────────────────────────────────
const DEF={
  navigation:[
    {id:1,sec:'Main',items:[{id:'home',ic:'🏠',lb:'Dashboard',adm:false}]},
    {id:2,sec:'Tools',items:[{id:'accounts',ic:'🏥',lb:'Accounts',adm:false}]},
    {id:3,sec:'Admin',items:[{id:'admin',ic:'⚙️',lb:'Settings',adm:true}]}
  ]
};

// ── STATE ───────────────────────────────────────────────────────────
function load(k,d){try{const s=localStorage.getItem('cc2_'+k);return s?JSON.parse(s):d;}catch(e){return d;}}
function save(k,v){try{localStorage.setItem('cc2_'+k,JSON.stringify(v));}catch(e){}}
const S={
  panel:'home',dark:load('dark',false),
  navigation:load('navigation',DEF.navigation),
  auth:false,
  navEdit:null
};
function persist(k){save(k,S[k]);}
function notify(msg){
  const n=document.createElement('div');n.style.cssText='position:fixed;bottom:20px;right:20px;background:'+getComputedStyle(document.documentElement).getPropertyValue('--text')+';color:'+getComputedStyle(document.documentElement).getPropertyValue('--bg2')+';padding:10px 16px;border-radius:9px;font-size:12.5px;font-weight:600;z-index:9999;animation:nfp 0.25s ease;box-shadow:0 8px 30px rgba(0,0,0,0.12)';n.textContent=msg;
  document.body.appendChild(n);setTimeout(()=>n.remove(),2500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── RENDER ──────────────────────────────────────────────────────────
function render(){
  if(S.dark)document.body.setAttribute('data-dark','1');
  else document.body.removeAttribute('data-dark');
  document.getElementById('root').innerHTML=appHTML();
  bind();
}

function appHTML(){
  return `<div id="app">
    <aside id="sidebar">
      <div class="sb-logo"><div class="sb-ic">🏥</div><div><div class="sb-brand">Care Connectors</div><div class="sb-ver">Hub v2.0</div></div></div>
      <nav style="flex:1;overflow-y:auto;padding:8px">
        ${S.navigation.map(g=>`
          <div class="nav-grp">
            <div class="nav-grp-hdr">
              <div class="nav-lbl">${esc(g.sec)}</div>
              <div style="display:flex;gap:2px">
                <button class="nav-grp-btn" data-add-item="${g.id}" title="Add item">+</button>
                <button class="nav-grp-btn" data-edit-sec="${g.id}" title="Edit section">✎</button>
                <button class="nav-grp-btn" data-del-sec="${g.id}" title="Delete section">−</button>
              </div>
            </div>
            ${g.items.map(i=>`
              <div class="nav-btn${S.panel===i.id?' active':''}${i.adm?' adm':''}" data-pid="${i.id}">
                <div class="nav-btn-left">
                  <span class="nav-ic">${i.ic}</span>
                  <span>${esc(i.lb)}</span>
                </div>
                <div class="nav-btn-right">
                  <button class="nav-btn-icon" data-edit-item="${i.id}" data-sec="${g.id}">✎</button>
                  <button class="nav-btn-icon" data-del-item="${i.id}" data-sec="${g.id}">✕</button>
                </div>
              </div>
            `).join('')}
          </div>
        `).join('')}
        <div class="nav-grp" style="margin-top:8px">
          <button class="btn bp" id="add-sec" style="width:100%;justify-content:center">+ Add Section</button>
        </div>
      </nav>
      <div style="padding:8px;border-top:1px solid var(--border)">
        <button class="hbtn" id="dark-tog" style="width:100%">${S.dark?'☀️':'🌙'}</button>
      </div>
    </aside>
    <div id="main">
      <div id="header">
        <div><div class="h-title">${getPageTitle()}</div></div>
        <div class="h-act">
          ${S.auth?`<button class="hbtn" id="adm-lock">🔒 Lock Admin</button>`:''}
        </div>
      </div>
      <div id="content">${renderPage()}</div>
    </div>
  </div>`;
}

function getPageTitle(){
  const page=S.navigation.flatMap(g=>g.items).find(i=>i.id===S.panel);
  return page?esc(page.lb):'Page';
}

function renderPage(){
  if(S.panel==='admin'){
    return navManagerHTML();
  }
  return `<div class="card"><div class="st">${getPageTitle()}</div><div class="ss">Content area</div></div>`;
}

function navManagerHTML(){
  return `<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div><div class="st">Navigation Manager</div><div class="ss">Customize sidebar sections and pages</div></div>
    </div>
    ${S.navigation.map((g,gi)=>`
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(g.sec)}</div>
          <div style="display:flex;gap:4px">
            <button class="btn bg bsm" data-edit-sec-mgr="${g.id}">✏️ Edit</button>
            <button class="btn bd bsm" data-del-sec-mgr="${g.id}">🗑</button>
          </div>
        </div>
        ${g.items.map((i,ii)=>`
          <div class="rw">
            <div style="display:flex;align-items:center;gap:8px;flex:1">
              <span style="font-size:13px">${i.ic}</span>
              <span style="font-size:12.5px;color:var(--text);font-weight:500">${esc(i.lb)}</span>
              ${i.adm?'<span style="font-size:9px;background:var(--abg);color:var(--admin);padding:2px 6px;border-radius:3px;font-weight:700">ADMIN</span>':''}
            </div>
            <div style="display:flex;gap:4px">
              <button class="btn bg bsm" data-edit-item-mgr="${i.id}" data-sec-idx="${gi}">✏️</button>
              <button class="btn bd bsm" data-del-item-mgr="${i.id}" data-sec-idx="${gi}">🗑</button>
            </div>
          </div>
        `).join('')}
      </div>
    `).join('')}
  </div>`;
}

// ── EVENT BINDING ────────────────────────────────────────────────────
function bind(){
  // Navigation click
  document.querySelectorAll('[data-pid]').forEach(b=>b.onclick=()=>{
    const id=b.dataset.pid;
    S.panel=id;
    render();
  });

  // Dark mode
  const dtog=document.getElementById('dark-tog');
  if(dtog)dtog.onclick=()=>{S.dark=!S.dark;persist('dark');render()};

  // Add section
  const addSec=document.getElementById('add-sec');
  if(addSec)addSec.onclick=()=>{
    const newSec={id:Date.now(),sec:prompt('Section name:','New Section')||'Section',items:[]};
    if(newSec.sec){
      S.navigation.push(newSec);
      persist('navigation');
      notify('Section added');
      render();
    }
  };

  // Edit section
  document.querySelectorAll('[data-edit-sec]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const gid=parseInt(b.dataset.editSec);
    const g=S.navigation.find(x=>x.id===gid);
    if(g){
      const newName=prompt('Section name:',g.sec);
      if(newName){
        g.sec=newName;
        persist('navigation');
        notify('Section updated');
        render();
      }
    }
  });

  // Delete section
  document.querySelectorAll('[data-del-sec]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const gid=parseInt(b.dataset.delSec);
    if(confirm('Delete this section and all its items?')){
      S.navigation=S.navigation.filter(x=>x.id!==gid);
      persist('navigation');
      notify('Section deleted');
      render();
    }
  });

  // Add item to section
  document.querySelectorAll('[data-add-item]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const gid=parseInt(b.dataset.addItem);
    const g=S.navigation.find(x=>x.id===gid);
    if(g){
      const lb=prompt('Item label:','New Item');
      if(lb){
        const ic=prompt('Icon/Emoji:','📄');
        const newItem={id:'item-'+Date.now(),ic:ic||'📄',lb:lb,adm:false};
        g.items.push(newItem);
        persist('navigation');
        notify('Item added');
        render();
      }
    }
  });

  // Edit item
  document.querySelectorAll('[data-edit-item]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const iid=b.dataset.editItem;
    const gid=parseInt(b.dataset.sec);
    const g=S.navigation.find(x=>x.id===gid);
    const i=g?.items.find(x=>x.id===iid);
    if(i){
      const newLb=prompt('Item label:',i.lb);
      if(newLb){
        const newIc=prompt('Icon/Emoji:',i.ic);
        i.lb=newLb;
        i.ic=newIc||i.ic;
        persist('navigation');
        notify('Item updated');
        render();
      }
    }
  });

  // Delete item
  document.querySelectorAll('[data-del-item]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const iid=b.dataset.delItem;
    const gid=parseInt(b.dataset.sec);
    const g=S.navigation.find(x=>x.id===gid);
    if(g && confirm('Delete this item?')){
      g.items=g.items.filter(x=>x.id!==iid);
      persist('navigation');
      notify('Item deleted');
      if(S.panel===iid)S.panel='home';
      render();
    }
  });

  // Manager edit section
  document.querySelectorAll('[data-edit-sec-mgr]').forEach(b=>b.onclick=()=>{
    const gid=parseInt(b.dataset.editSecMgr);
    const g=S.navigation.find(x=>x.id===gid);
    if(g){
      const newName=prompt('Section name:',g.sec);
      if(newName){
        g.sec=newName;
        persist('navigation');
        notify('Section updated');
        render();
      }
    }
  });

  // Manager delete section
  document.querySelectorAll('[data-del-sec-mgr]').forEach(b=>b.onclick=()=>{
    const gid=parseInt(b.dataset.delSecMgr);
    if(confirm('Delete this section and all its items?')){
      S.navigation=S.navigation.filter(x=>x.id!==gid);
      persist('navigation');
      notify('Section deleted');
      render();
    }
  });

  // Manager edit item
  document.querySelectorAll('[data-edit-item-mgr]').forEach(b=>b.onclick=()=>{
    const iid=b.dataset.editItemMgr;
    const gi=parseInt(b.dataset.secIdx);
    const g=S.navigation[gi];
    const i=g?.items.find(x=>x.id===iid);
    if(i){
      const newLb=prompt('Item label:',i.lb);
      if(newLb){
        const newIc=prompt('Icon/Emoji:',i.ic);
        i.lb=newLb;
        i.ic=newIc||i.ic;
        persist('navigation');
        notify('Item updated');
        render();
      }
    }
  });

  // Manager delete item
  document.querySelectorAll('[data-del-item-mgr]').forEach(b=>b.onclick=()=>{
    const iid=b.dataset.delItemMgr;
    const gi=parseInt(b.dataset.secIdx);
    const g=S.navigation[gi];
    if(g && confirm('Delete this item?')){
      g.items=g.items.filter(x=>x.id!==iid);
      persist('navigation');
      notify('Item deleted');
      if(S.panel===iid)S.panel='home';
      render();
    }
  });

  // Lock admin
  const admLock=document.getElementById('adm-lock');
  if(admLock)admLock.onclick=()=>{S.auth=false;render()};
}

render();
</script>
</body>
</html>
