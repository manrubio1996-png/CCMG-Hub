.aerb.on{background:rgba(0,201,167,0.1);border-color:var(--accent);color:var(--accent2)}

{id:"not-interested",name:"Not Interested",ack:"It sounds like you feel your health is currently stable.",emp:"I understand. When you're feeling fine, extra visits can feel unnecessary.",rebuttals:["That's exactly why preventive care matters most when you feel fine — many serious conditions begin silently.","Preventive visits help keep everything on track — medications, screenings, health risks.","It's about keeping things simple now so they don't become complicated later."]},
{id:"prefer-pcp",name:"Prefer PCP / VA",ack:"That's great — having a doctor you trust is important.",emp:"I completely understand. If you already feel well taken care of, another visit may not seem necessary.",rebuttals:["This visit supports your PCP, not replaces them. Results are shared with your doctor.","Even members very loyal to their PCP complete this for dedicated prevention time.","This gives you and your doctor one more chance to catch anything early."]},
{id:"already-had",name:"Already Had Assessment",ack:"That's great — staying updated is important.",emp:"I understand — if you already had one, it can feel repetitive.",rebuttals:["Even if you've had one, this visit focuses on prevention — making sure nothing is overlooked.","Health information changes quickly. This ensures your record is fully updated for the year.","This helps keep everything aligned with your coverage so there aren't any gaps later."]},
{id:"healthy",name:"Healthy / Not Sick",ack:"That's wonderful to hear.",emp:"I understand why it might not feel urgent.",rebuttals:["Preventive care isn't for when you're sick — it's for staying healthy long term.","Even healthy individuals benefit from structured reviews because early risk factors develop quietly.","This just helps you stay exactly where you are — healthy and ahead of any problems."]},
{id:"too-busy",name:"Too Busy",ack:"It sounds like your schedule is very full.",emp:"I understand — adding anything extra can feel overwhelming.",rebuttals:["This assessment is 15–30 minutes with no travel required.","Delaying prevention often results in longer appointments later.","A little time now can save a lot more time and stress down the road."]},
{id:"call-back",name:"Call Me Back",ack:"I understand — this might not be the best time.",emp:"I know it's hard to make decisions on the spot.",rebuttals:["We can reserve a flexible appointment — if anything changes, we can always adjust.","Many people plan to schedule later, but it often gets delayed when it's not on the calendar.","Setting it now just makes sure it doesn't fall through the cracks."]},
{id:"who-is-cc",name:"Who is Care Connectors?",ack:"That's a great question.",emp:"It's smart to double-check.",rebuttals:["We coordinate directly with your medical group to complete your annual preventive assessment.","Our role is preventive coordination — to strengthen, not replace, your existing provider relationship.","We're simply here to support your care team and help everything run more smoothly."]},
{id:"whats-catch",name:"Free — What's the Catch?",ack:"I completely understand wanting reassurance.",emp:"It's smart to ask questions.",rebuttals:["This is a covered preventive benefit — no hidden fees, HIPAA-protected, shared only with your doctor.","Preventive programs exist to reduce long-term healthcare risks by identifying concerns early.","There's really no catch — it's simply an extra layer of protection already included in your benefits."]},

function load(k,d){try{const s=localStorage.getItem('cc2_'+k);return s?JSON.parse(s):d;}catch(e){return d;}}
function save(k,v){try{localStorage.setItem('cc2_'+k,JSON.stringify(v));}catch(e){}}
const S={
  panel:'accounts',dark:load('dark',false),search:'',
  accounts:load('accounts',DEF.accounts),
  durations:load('durations',DEF.durations),
  dispositions:load('dispositions',DEF.dispositions),
  aer:load('aer',DEF.aer),
  acronyms:load('acronyms',DEF.acronyms),
  reminders:load('reminders',DEF.reminders),
  qa:load('qa',DEF.qa),
  users:load('users',DEF.users),
  revisions:load('revisions',[]),
  selAcc:null,activeTab:'opening',accFilt:'All',
  aerSel:null,qaChk:{},
  auth:false,adminPanel:'dashboard',editId:null,
  gSearchQ:'',gSearchRes:[]
};
function initQA(){const r={};S.qa.forEach(s=>s.items.forEach(i=>r[i.id]=true));S.qaChk=r;}
initQA();
function persist(k){save(k,S[k]);}
function addRev(section,desc){
  S.revisions=[{id:Date.now(),ts:new Date().toLocaleString(),section,desc},...S.revisions.slice(0,99)];
  persist('revisions');
}
function notify(msg){
  const n=document.createElement('div');n.className='ntf';n.textContent=msg;
  document.body.appendChild(n);setTimeout(()=>n.remove(),2500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gv(id){const e=document.getElementById(id);return e?e.value:'';}

// ── RENDER ──────────────────────────────────────────────────────────
function render(){
  if(S.dark)document.body.setAttribute('data-dark','1');
  else document.body.removeAttribute('data-dark');
  document.getElementById('root').innerHTML=S.panel==='admin'&&!S.auth?loginHTML():appHTML();
  bind();
}
function ri(){const c=document.getElementById('content');if(c){c.innerHTML=panelHTML();bind();}}
function ra(){const c=document.querySelector('.ac2');if(c){c.innerHTML=admSec();bind();}}

function qaPanel(){
  const all=S.qa.flatMap(s=>s.items);
  const allPts=all.filter(i=>!i.auto).reduce((a,i)=>a+i.pts,0);
  const aFail=all.filter(i=>i.auto&&!S.qaChk[i.id]);
  let score=0,status='',scC='var(--red)';
  if(aFail.length){score=0;status=`${aFail.length} AUTO-FAIL`;scC='var(--red)';}
  else{
    const lost=all.filter(i=>!i.auto&&!S.qaChk[i.id]).reduce((a,i)=>a+i.pts,0);
    score=Math.round(Math.max(0,(allPts-lost)/(allPts||1)*100));
    if(score>=95){status='Excellent! 🌟';scC='var(--green)';}
    else if(score>=80){status='Good';scC='var(--yellow)';}
    else{status='Needs Work';scC='var(--red)';}
  }
  return `<div class="card" style="display:flex;align-items:center;gap:20px;margin-bottom:14px;flex-wrap:wrap">
    <div style="text-align:center;flex-shrink:0">
      <div style="font-size:52px;font-weight:900;font-family:monospace;line-height:1;color:${scC}">${score}</div>
      <div style="font-size:9.5px;text-transform:uppercase;letter-spacing:0.18em;color:var(--text3);font-weight:700;margin-top:4px">${esc(status)}</div>
    </div>
    <div style="flex:1;min-width:180px">
      <div style="height:9px;background:var(--bg3);border-radius:999px;overflow:hidden;border:1px solid var(--border);margin-bottom:7px">
        <div style="height:100%;width:${score}%;background:${scC};border-radius:999px;transition:width 0.6s ease"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:9.5px;font-family:monospace;color:var(--text3);text-transform:uppercase">Live Performance Scorecard</span>
        <button class="btn bg bsm" id="qa-rst">↺ Reset</button>
      </div>
    </div>
  </div>
  ${S.qa.map(sec=>`<div style="margin-bottom:4px">
    <div style="display:flex;justify-content:space-between;padding:10px 4px 5px">
      <div style="font-size:9.5px;font-weight:900;text-transform:uppercase;letter-spacing:0.2em;color:var(--text3);font-family:monospace">${esc(sec.name)}</div>
      <div style="font-size:9.5px;font-family:monospace;color:var(--text3)">${sec.pts} pts</div>

      <div class="qchk ${S.qaChk[it.id]?(it.auto?'f':'p'):''}">
        ${S.qaChk[it.id]?'<span style="color:#fff;font-size:11px">✓</span>':''}
      </div>
      <div style="flex:1">
        <div style="font-size:12.5px;font-weight:500;color:var(--text);line-height:1.4">${esc(it.text)}</div>
        <div style="font-size:9.5px;color:var(--text3);font-family:monospace;margin-top:2px">${esc(it.note)}</div>
      </div>
      ${it.auto?'<span class="bdg bg-r">Auto-fail</span>':''}
      ${it.pts>=10&&!it.auto?'<span class="bdg bg-r">Critical</span>':''}
      ${it.pts>0?`<span style="font-size:10.5px;font-family:monospace;color:var(--text3)">${it.pts}pt</span>`:''}
    </div>`).join('')}
  </div>`).join('')}`;

function admGSearch(){
  return `<div>
    <div class="st">Global Search</div><div class="ss">Search across all hub content — accounts, scripts, rebuttals, acronyms, durations</div>
    <div style="position:relative;margin-bottom:16px">

      <input id="gsch-inp" class="ainp" placeholder="Search all content…" value="${esc(S.gSearchQ)}" style="padding-left:36px;font-size:14px;width:100%"/>
    </div>
    ${S.gSearchRes.length?`<div style="font-size:11px;color:var(--text3);margin-bottom:8px">${S.gSearchRes.length} result(s)</div>
      ${S.gSearchRes.map(r=>`<div class="sr" data-p="${r.panel}">

          <span class="bdg bg-t">${esc(r.section)}</span>

        </div>
        <div style="font-size:12px;color:var(--text2);font-style:italic">${esc(r.snippet)}</div>
      </div>`).join('')}`:S.gSearchQ?'<div style="text-align:center;padding:40px;color:var(--text3)">No results found</div>':'<div style="text-align:center;padding:40px;color:var(--text3)">Start typing to search all hub content</div>'}
  </div>`;
}

function runSearch(q){
  if(!q){S.gSearchRes=[];return;}
  const ql=q.toLowerCase(),res=[];
  S.accounts.forEach(a=>{
    if(a.name.toLowerCase().includes(ql)||JSON.stringify(a.scripts||{}).toLowerCase().includes(ql)||a.gcNote.toLowerCase().includes(ql))
      res.push({section:'Accounts',title:a.name,snippet:a.gcNote||a.types.join(', '),panel:'accounts'});
  });
  S.aer.forEach(o=>{
    if(o.name.toLowerCase().includes(ql)||o.ack.toLowerCase().includes(ql)||o.rebuttals.join(' ').toLowerCase().includes(ql))
      res.push({section:'AER',title:o.name,snippet:o.ack.substring(0,80),panel:'aer'});
  });
  S.acronyms.forEach(a=>{
    if(a.code.toLowerCase().includes(ql)||a.full.toLowerCase().includes(ql))
      res.push({section:'Acronyms',title:a.code,snippet:a.full,panel:'acronyms'});
  });
  S.durations.forEach(d=>{
    if(d.account.toLowerCase().includes(ql))
      res.push({section:'Durations',title:d.account,snippet:d.dur+(d.note?' — '+d.note:''),panel:'duration'});
  });
  S.gSearchRes=res.slice(0,25);
}

// ── RICH TEXT EDITOR ─────────────────────────────────────────────────
function rteHTML(bodyId,content){
  const tools=[
    {cmd:'bold',lb:'<b>B</b>'},{cmd:'italic',lb:'<i>I</i>'},{cmd:'underline',lb:'<u>U</u>'},
    {cmd:'strikeThrough',lb:'<s>S</s>'},'|',
    {cmd:'formatBlock',val:'h1',lb:'H1'},{cmd:'formatBlock',val:'h2',lb:'H2'},
    {cmd:'formatBlock',val:'p',lb:'P'},'|',
    {cmd:'insertUnorderedList',lb:'•—'},{cmd:'insertOrderedList',lb:'1.'},'|',
    {cmd:'createLink',lb:'🔗'},{cmd:'removeFormat',lb:'✕'},'|',
    {cmd:'undo',lb:'↩'},{cmd:'redo',lb:'↪'},'|',
    {cmd:'insertTable',lb:'⊞'},{cmd:'insertCode',lb:'&lt;/&gt;'}
  ];
  return `<div class="rte-tb">
    <select class="rsel" data-rte="${bodyId}" data-cmd="fontSize">
      ${[1,2,3,4,5].map((s,i)=>`<option value="${s}" ${s===3?'selected':''}>${[10,12,14,16,18][i]}px</option>`).join('')}
    </select>
    <select class="rsel" data-rte="${bodyId}" data-cmd="foreColor" style="width:76px">
      <option value="">Color</option>
      <option value="#000000">Black</option><option value="#ef4444">Red</option>
      <option value="#f59e0b">Orange</option><option value="#10b981">Green</option>
      <option value="#3b82f6">Blue</option><option value="#7c3aed">Purple</option>
    </select>
    <select class="rsel" data-rte="${bodyId}" data-cmd="hiliteColor" style="width:82px">
      <option value="transparent">Highlight</option>
      <option value="#fef08a">Yellow</option><option value="#bbf7d0">Green</option>
      <option value="#bfdbfe">Blue</option><option value="#fecaca">Red</option>
    </select>
    <div class="rsep"></div>
    ${tools.map(t=>t==='|'?'<div class="rsep"></div>':
      `<button class="rte-t" data-rte="${bodyId}" data-cmd="${t.cmd}" ${t.val?`data-val="${t.val}"`:''}>${t.lb}</button>`
    ).join('')}
  </div>
  <div class="rbody" id="${bodyId}" contenteditable="true">${content}</div>
  <div class="rfoot"><span id="${bodyId}-wc">0 words</span><span>Ctrl+B/I/U · Ctrl+Z/Y</span></div>`;
}

window.upSEO=function(idx,field,el){
  if(!S.accounts[idx].seo)S.accounts[idx].seo={title:'',desc:''};

  const tb=document.getElementById(`seo-tb-${idx}`);

// ── BIND ──────────────────────────────────────────────────────────────
function bind(){
  // Nav
  document.querySelectorAll('[data-p]').forEach(el=>el.onclick=()=>{S.panel=el.dataset.p;S.selAcc=null;S.editId=null;render();});
  // Dark
  const dt=document.getElementById('dark-tog');if(dt)dt.onclick=()=>{S.dark=!S.dark;save('dark',S.dark);render();};
  // Search
  const gs=document.getElementById('gsrch');if(gs)gs.oninput=e=>{S.search=e.target.value;ri();};
  // Login
  const pg=document.getElementById('pwd-go');
  if(pg){
    const doLogin=()=>{const v=document.getElementById('pwd').value;if(v==='Admin2026#'){S.auth=true;render();}else{document.getElementById('pwd-err').textContent='Incorrect password.';document.getElementById('pwd').value='';}};
    pg.onclick=doLogin;document.getElementById('pwd').onkeydown=e=>{if(e.key==='Enter')doLogin();};
    document.getElementById('pwd-back').onclick=()=>{S.panel='accounts';render();};
  }
  // Accounts panel
  document.querySelectorAll('[data-aid]').forEach(el=>el.onclick=()=>{const id=parseInt(el.dataset.aid);S.selAcc=S.selAcc===id?null:id;S.activeTab='opening';ri();});
  document.querySelectorAll('[data-f]').forEach(el=>el.onclick=()=>{S.accFilt=el.dataset.f;S.selAcc=null;ri();});
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{S.activeTab=el.dataset.tab;ri();});
  // AER panel
  document.querySelectorAll('[data-aer]').forEach(el=>el.onclick=()=>{S.aerSel=S.aerSel===el.dataset.aer?null:el.dataset.aer;ri();});
  // QA panel
  document.querySelectorAll('[data-qi]').forEach(el=>el.onclick=()=>{const id=el.dataset.qi;S.qaChk[id]=!S.qaChk[id];ri();});
  const qr=document.getElementById('qa-rst');if(qr)qr.onclick=()=>{initQA();ri();};
  // Admin nav
  document.querySelectorAll('[data-an]').forEach(el=>el.onclick=()=>{S.adminPanel=el.dataset.an;S.editId=null;ra();bind();});
  const al=document.getElementById('adm-lock');if(al)al.onclick=()=>{S.auth=false;S.panel='accounts';render();};

  // ── Accounts CRUD
  const aa=document.getElementById('add-acc');if(aa)aa.onclick=()=>{S.editId='new-acc';ra();bind();};
  document.querySelectorAll('[data-edit-acc]').forEach(el=>el.onclick=()=>{S.editId=parseInt(el.dataset.editAcc);ra();bind();});
  document.querySelectorAll('[data-del-acc]').forEach(el=>el.onclick=()=>{
    if(!confirm('Delete this account?'))return;
    const id=parseInt(el.dataset.delAcc),name=S.accounts.find(a=>a.id===id)?.name||'';
    S.accounts=S.accounts.filter(a=>a.id!==id);persist('accounts');addRev('Accounts','Deleted: '+name);notify('✓ Account deleted');ra();bind();
  });
  document.querySelectorAll('[data-tog-acc]').forEach(el=>el.onchange=()=>{
    const id=parseInt(el.dataset.togAcc),acc=S.accounts.find(a=>a.id===id);
    if(acc){acc.visible=el.checked;persist('accounts');addRev('Accounts',`${acc.name} → ${el.checked?'Published':'Hidden'}`);notify(`✓ ${acc.name} ${el.checked?'published':'hidden'}`);}
  });
  document.querySelectorAll('[data-save-acc]').forEach(el=>el.onclick=()=>{
    const id=parseInt(el.dataset.saveAcc),isNew=el.dataset.new==='1';
    const gt=bid=>{const e=document.getElementById(bid);return e?(e.innerText||e.textContent||'').trim():'';}
    const acc={
      id:isNew?Date.now():id,name:gv('af-name'),tag:gv('af-tag'),
      types:gv('af-types').split(',').map(t=>t.trim()).filter(Boolean),
      dur:gv('af-dur'),win:gv('af-win'),
      gc:document.getElementById('af-gc')?.checked||false,
      gcAmt:gv('af-gcAmt'),gcType:gv('af-gcType'),gcTime:gv('af-gcTime'),gcContact:gv('af-gcContact'),gcNote:gv('af-gcNote'),
      visible:true,seo:{title:'',desc:''},
      scripts:{opening:gt('rte-opening'),pitch:gt('rte-pitch'),verification:gt('rte-verification'),required:gt('rte-required'),closing:gt('rte-closing')}
    };
    if(isNew)S.accounts.push(acc);else{const i=S.accounts.findIndex(a=>a.id===id);if(i!==-1)S.accounts[i]=acc;}
    persist('accounts');addRev('Accounts',(isNew?'Added':'Updated')+': '+acc.name);notify(`✓ "${acc.name}" saved`);S.editId=null;ra();bind();
  });
  const afc=document.getElementById('af-cancel');if(afc)afc.onclick=()=>{S.editId=null;ra();bind();};

  // ── Durations CRUD
  const ad=document.getElementById('add-dur');if(ad)ad.onclick=()=>{S.editId='new-dur';ra();bind();};
  document.querySelectorAll('[data-edit-dur]').forEach(el=>el.onclick=()=>{S.editId=`dur-${el.dataset.editDur}`;ra();bind();});
  document.querySelectorAll('[data-del-dur]').forEach(el=>el.onclick=()=>{
    if(!confirm('Delete?'))return;
    S.durations.splice(parseInt(el.dataset.delDur),1);persist('durations');addRev('Durations','Deleted entry');notify('✓ Deleted');ra();bind();
  });
  document.querySelectorAll('[data-save-dur]').forEach(el=>el.onclick=()=>{
    const isNew=el.dataset.saveDur==='new';
    const d={account:gv('df-acc'),dur:gv('df-dur'),cls:gv('df-cls'),note:gv('df-note')};
    if(isNew)S.durations.push(d);else S.durations[parseInt(el.dataset.saveDur)]=d;
    persist('durations');addRev('Durations',(isNew?'Added':'Updated')+': '+d.account);notify(`✓ "${d.account}" saved`);S.editId=null;ra();bind();
  });
  const dfc=document.getElementById('df-cancel');if(dfc)dfc.onclick=()=>{S.editId=null;ra();bind();};

  // ── AER CRUD
  const aa2=document.getElementById('add-aer');if(aa2)aa2.onclick=()=>{S.editId='new-aer';ra();bind();};
  document.querySelectorAll('[data-edit-aer]').forEach(el=>el.onclick=()=>{S.editId=`aer-${el.dataset.editAer}`;ra();bind();});
  document.querySelectorAll('[data-del-aer]').forEach(el=>el.onclick=()=>{
    if(!confirm('Delete this rebuttal?'))return;
    S.aer.splice(parseInt(el.dataset.delAer),1);persist('aer');addRev('AER','Deleted rebuttal');notify('✓ Deleted');ra();bind();
  });
  document.querySelectorAll('[data-save-aer]').forEach(el=>el.onclick=()=>{
    const isNew=el.dataset.saveAer==='new';
    const gt=bid=>{const e=document.getElementById(bid);return e?(e.innerText||'').trim():'';}
    const o={id:gv('aerf-id')||'obj-'+Date.now(),name:gv('aerf-name'),ack:gt('rte-ack'),emp:gt('rte-emp'),rebuttals:[gt('rte-reb0'),gt('rte-reb1'),gt('rte-reb2')].filter(Boolean)};
    if(isNew)S.aer.push(o);else S.aer[parseInt(el.dataset.saveAer)]=o;
    persist('aer');addRev('AER',(isNew?'Added':'Updated')+': '+o.name);notify(`✓ "${o.name}" saved`);S.editId=null;ra();bind();
  });
  const aerc=document.getElementById('aerf-cancel');if(aerc)aerc.onclick=()=>{S.editId=null;ra();bind();};

  // ── Acronyms CRUD
  const aacr=document.getElementById('add-acr');if(aacr)aacr.onclick=()=>{S.editId='new-acr';ra();bind();};
  document.querySelectorAll('[data-edit-acr]').forEach(el=>el.onclick=()=>{S.editId=`acr-${el.dataset.editAcr}`;ra();bind();});
  document.querySelectorAll('[data-del-acr]').forEach(el=>el.onclick=()=>{
    if(!confirm('Delete?'))return;
    S.acronyms.splice(parseInt(el.dataset.delAcr),1);persist('acronyms');addRev('Acronyms','Deleted entry');notify('✓ Deleted');ra();bind();
  });
  document.querySelectorAll('[data-save-acr]').forEach(el=>el.onclick=()=>{
    const isNew=el.dataset.saveAcr==='new';
    const a={code:gv('acrf-code'),full:gv('acrf-full'),spiel:gv('acrf-spiel')};
    if(isNew)S.acronyms.push(a);else S.acronyms[parseInt(el.dataset.saveAcr)]=a;
    persist('acronyms');addRev('Acronyms',(isNew?'Added':'Updated')+': '+a.code);notify(`✓ "${a.code}" saved`);S.editId=null;ra();bind();
  });
  const acrc=document.getElementById('acrf-cancel');if(acrc)acrc.onclick=()=>{S.editId=null;ra();bind();};

  // ── Reminders CRUD
  const ar=document.getElementById('add-rem');if(ar)ar.onclick=()=>{S.editId='new-rem';ra();bind();};
  document.querySelectorAll('[data-edit-rem]').forEach(el=>el.onclick=()=>{S.editId=`rem-${el.dataset.editRem}`;ra();bind();});
  document.querySelectorAll('[data-del-rem]').forEach(el=>el.onclick=()=>{
    if(!confirm('Delete?'))return;
    S.reminders.splice(parseInt(el.dataset.delRem),1);persist('reminders');addRev('Reminders','Deleted script');notify('✓ Deleted');ra();bind();
  });
  document.querySelectorAll('[data-save-rem]').forEach(el=>el.onclick=()=>{
    const isNew=el.dataset.saveRem==='new';
    const body=document.getElementById('rte-remscript');
    const r={label:gv('remf-label'),color:document.getElementById('remf-color')?.value||'#00c9a7',script:body?(body.innerText||'').trim():''};
    if(isNew)S.reminders.push(r);else S.reminders[parseInt(el.dataset.saveRem)]=r;
    persist('reminders');addRev('Reminders',(isNew?'Added':'Updated')+': '+r.label);notify(`✓ "${r.label}" saved`);S.editId=null;ra();bind();
  });
  const remc=document.getElementById('remf-cancel');if(remc)remc.onclick=()=>{S.editId=null;ra();bind();};

  // ── Users CRUD
  const adu=document.getElementById('add-user');if(adu)adu.onclick=()=>{S.editId='new-user';ra();bind();};
  document.querySelectorAll('[data-edit-user]').forEach(el=>el.onclick=()=>{S.editId=`user-${el.dataset.editUser}`;ra();bind();});
  document.querySelectorAll('[data-del-user]').forEach(el=>el.onclick=()=>{
    if(!confirm('Delete this user?'))return;
    S.users.splice(parseInt(el.dataset.delUser),1);persist('users');addRev('Users','Deleted user');notify('✓ User deleted');ra();bind();
  });
  document.querySelectorAll('[data-tog-user]').forEach(el=>el.onchange=()=>{
    const i=parseInt(el.dataset.togUser);S.users[i].active=el.checked;persist('users');addRev('Users',`${S.users[i].name} → ${el.checked?'Active':'Inactive'}`);
  });
  document.querySelectorAll('[data-save-user]').forEach(el=>el.onclick=()=>{
    const isNew=el.dataset.saveUser==='new';
    const u={id:isNew?Date.now():S.users[parseInt(el.dataset.saveUser)]?.id,name:gv('uf-name'),email:gv('uf-email'),role:gv('uf-role'),avatar:gv('uf-avatar')||'🎧',color:document.getElementById('uf-color')?.value||'#10b981',active:true,created:new Date().toISOString().slice(0,10)};
    if(isNew)S.users.push(u);else S.users[parseInt(el.dataset.saveUser)]=u;
    persist('users');addRev('Users',(isNew?'Added':'Updated')+': '+u.name);notify(`✓ "${u.name}" saved`);S.editId=null;ra();bind();
  });
  const ufc=document.getElementById('uf-cancel');if(ufc)ufc.onclick=()=>{S.editId=null;ra();bind();};

  // ── Global Search
  const gsi=document.getElementById('gsch-inp');
  if(gsi)gsi.oninput=e=>{S.gSearchQ=e.target.value;runSearch(S.gSearchQ);ra();bind();};
  document.querySelectorAll('.sr[data-p]').forEach(el=>el.onclick=()=>{S.panel=el.dataset.p;S.auth=true;render();});

  // ── Revisions
  const crv=document.getElementById('clear-revs');if(crv)crv.onclick=()=>{if(confirm('Clear all revision history?')){S.revisions=[];persist('revisions');notify('✓ History cleared');ra();bind();}};

  // ── Backup
  const de=document.getElementById('do-export');
  if(de)de.onclick=()=>{
    const data=JSON.stringify({accounts:S.accounts,durations:S.durations,aer:S.aer,acronyms:S.acronyms,reminders:S.reminders,users:S.users},null,2);
    const blob=new Blob([data],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`cc_hub_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);
    addRev('Backup','Exported configuration');notify('✓ Backup downloaded');
  };
  const dr=document.getElementById('do-reset');
  if(dr)dr.onclick=()=>{
    if(!confirm('FACTORY RESET — all data replaced with defaults. Continue?'))return;
    ['accounts','durations','aer','acronyms','reminders','users'].forEach(k=>{S[k]=[...DEF[k]];persist(k);});
    S.revisions=[];persist('revisions');addRev('System','Factory reset performed');notify('✓ Factory reset complete');render();
  };
  const di=document.getElementById('do-import');
  if(di)di.onclick=()=>{
    const raw=(document.getElementById('import-json')||{}).value||'';
    try{
      const p=JSON.parse(raw);
      if(!confirm('Replace all data with this backup?'))return;
      ['accounts','durations','aer','acronyms','reminders','users'].forEach(k=>{if(p[k]){S[k]=p[k];persist(k);}});
      addRev('System','Imported backup');notify('✓ Configuration imported');render();
    }catch(e){alert('Invalid JSON. Please check your backup file.');}
  };

  // ── Rich Text Editor
  document.querySelectorAll('.rte-t[data-cmd]').forEach(btn=>{
    btn.onclick=e=>{
      e.preventDefault();
      const bodyId=btn.dataset.rte,body=document.getElementById(bodyId);
      if(!body)return;body.focus();
      const cmd=btn.dataset.cmd,val=btn.dataset.val||null;
      if(cmd==='insertTable'){document.execCommand('insertHTML',false,'<table><tr><td>Cell 1</td><td>Cell 2</td></tr><tr><td>Cell 3</td><td>Cell 4</td></tr></table>');}
      else if(cmd==='insertCode'){document.execCommand('insertHTML',false,'<pre><code>// code here</code></pre>');}
      else if(cmd==='createLink'){const u=prompt('Enter URL:','https://');if(u)document.execCommand('createLink',false,u);}
      else document.execCommand(cmd,false,val);
      updWC(bodyId);
    };
  });
  document.querySelectorAll('.rsel[data-cmd]').forEach(sel=>{
    sel.onchange=()=>{
      const bodyId=sel.dataset.rte,body=document.getElementById(bodyId);
      if(!body)return;body.focus();document.execCommand(sel.dataset.cmd,false,sel.value);updWC(bodyId);
    };
  });
  document.querySelectorAll('.rbody').forEach(body=>{
    body.oninput=()=>updWC(body.id);
    body.onkeydown=e=>{
      if(e.ctrlKey&&e.key==='b'){e.preventDefault();document.execCommand('bold');}
      if(e.ctrlKey&&e.key==='i'){e.preventDefault();document.execCommand('italic');}
      if(e.ctrlKey&&e.key==='u'){e.preventDefault();document.execCommand('underline');}
    };
  });
}

function updWC(bodyId){
  const body=document.getElementById(bodyId),wc=document.getElementById(bodyId+'-wc');
  if(body&&wc){const words=(body.innerText||'').trim().split(/\s+/).filter(Boolean).length;wc.textContent=words+' words';}
}

// Auto-save every 30s
setInterval(()=>['accounts','durations','aer','acronyms','reminders'].forEach(k=>persist(k)),30000);

render();
</script>
</body>
</html>
